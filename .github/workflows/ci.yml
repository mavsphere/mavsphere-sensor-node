name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: PlatformIO Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build esp32_tdisplay
        run: pio run --environment esp32_tdisplay

      - name: Build esp32s3_tdisplay
        run: pio run --environment esp32s3_tdisplay
