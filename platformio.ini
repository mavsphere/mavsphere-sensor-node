[platformio]
default_envs = esp32_tdisplay

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_flags =
  -DMQTT_MAX_PACKET_SIZE=8192

lib_deps =
  bblanchon/ArduinoJson @ ^7.4.3
  knolleary/PubSubClient @ ^2.8
  adafruit/Adafruit MCP23017 Arduino Library @ ^2.3.2  ; GPIO expander over I2C
  adafruit/Adafruit GFX Library @ ^1.12.5
  adafruit/Adafruit BusIO @ ^1.17.4
  bodmer/TFT_eSPI @ ^2.5.43
  WiFi
  WebServer
  SPI
  Wire
  LittleFS

[env:esp32_tdisplay]
board = esp32dev
build_flags =
  ${env.build_flags}
  -DCORE_DEBUG_LEVEL=3
  -DMAVSPHERE_SENSOR_NODE_VERSION=\"v1.0.0\"
  -DUSER_SETUP_LOADED=1
  -DBOARD_TDISPLAY_ESP32
  -include include/User_Setup_TDisplay.h

[env:esp32s3_tdisplay]
board = esp32-s3-devkitc-1
build_flags =
  ${env.build_flags}
  -DCORE_DEBUG_LEVEL=3
  -DMAVSPHERE_SENSOR_NODE_VERSION=\"v1.0.0\"
  -DUSER_SETUP_LOADED=1
  -DBOARD_TDISPLAY_S3
  -include include/User_Setup_TDisplay_S3.h
